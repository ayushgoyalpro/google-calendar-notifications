name: Release Client

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: ./mvnw package -DskipTests -f client/pom.xml

      - name: Prepare release artifact
        id: artifact
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ORIGINAL=$(ls client/target/client-*.jar | grep -v original | head -n 1)
          RENAMED="gcn-client-${VERSION}.jar"
          cp "$ORIGINAL" "$RENAMED"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION_NUM=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "JAR_NAME=${RENAMED}" >> $GITHUB_OUTPUT
          echo "SHA256=$(sha256sum "$RENAMED" | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GCN Client ${{ steps.artifact.outputs.VERSION }}
          files: ${{ steps.artifact.outputs.JAR_NAME }}
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.artifact.outputs.VERSION }}
          VERSION_NUM: ${{ steps.artifact.outputs.VERSION_NUM }}
          SHA256: ${{ steps.artifact.outputs.SHA256 }}
          REPO: ${{ github.repository }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/ayushgoyalpro/brew.git tap-repo
          mkdir -p tap-repo/Formula

          sed \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|VERSION_NUM_PLACEHOLDER|${VERSION_NUM}|g" \
            -e "s|SHA256_PLACEHOLDER|${SHA256}|g" \
            -e "s|REPO_PLACEHOLDER|${REPO}|g" \
            .github/homebrew/gcn.rb.template > tap-repo/Formula/gcn.rb

          cd tap-repo
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/gcn.rb
          git diff --staged --quiet && echo "No formula changes." && exit 0
          git commit -m "Update gcn to ${VERSION}"
          git push
