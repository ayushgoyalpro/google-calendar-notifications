<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Key</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 620px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 20px;
    }

    .key-box {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 20px 24px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 18px;
      letter-spacing: 0.08em;
      color: #a78bfa;
      word-break: break-all;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .key-box:hover {
      border-color: #4f4f4f;
      background: #111;
    }

    .copy-hint {
      margin-top: 12px;
      font-size: 12px;
      color: #444;
      transition: color 0.2s;
    }

    .copy-hint.copied {
      color: #6ee7b7;
    }

    .divider {
      border: none;
      border-top: 1px solid #1f1f1f;
      margin: 36px 0;
    }

    .note {
      font-size: 13px;
      color: #444;
      line-height: 1.7;
    }

    .note strong {
      color: #666;
    }

    .refresh-btn {
      margin-top: 32px;
      display: inline-block;
      padding: 10px 28px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: transparent;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
    }

    .refresh-btn:hover {
      border-color: #4f4f4f;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Your unique key</p>
    <div class="key-box" id="key" onclick="copyKey()" th:text="${key}"></div>
    <p class="copy-hint" id="hint">click to copy</p>
    <hr class="divider" />
    <p class="note">
      Keep this key &mdash; you will need it to link your<br />
      <strong>Google Calendar</strong> sync to your notification channels.<br />
      Refreshing this page generates a new key.
    </p>
    <a class="refresh-btn" href="/key">Generate new key</a>
  </div>

  <script>
    function copyKey() {
      const key = document.getElementById('key').innerText;
      navigator.clipboard.writeText(key).then(() => {
        const hint = document.getElementById('hint');
        hint.textContent = 'copied!';
        hint.classList.add('copied');
        setTimeout(() => {
          hint.textContent = 'click to copy';
          hint.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
